# =============================================================
#  Design Prompt — 抽象化された「デザインDNA」
#  特定のサイトの文言・レイアウト・コンテンツには依存しない、
#  配色・雰囲気・質感・タイポグラフィの "気分" だけを記述する。
#  まったく別ジャンルのサイトにもそのまま流用できる。
# =============================================================

meta:
  name: "Editorial Quiet Luxury"
  one_liner: >-
    紙の文芸誌のように静かで、知的で、落ち着いた品格のあるエディトリアル・デザイン。
    余白を主役にし、罫線とセリフ書体で「読ませる」誌面をつくる。
  use_for: >-
    ポートフォリオ／ブランドサイト／読み物メディア／士業・専門職サイト／
    上質さや信頼感を訴求したいあらゆるジャンルに転用可能。
  avoid_for: >-
    派手さ・勢い・お得感・ポップさを売りにしたいサイト
    （セール系EC、エンタメ、子供向け、ゲーミング等）には不向き。

# -------------------------------------------------------------
# 1. ムード / トーン — 言葉で雰囲気を縛る
# -------------------------------------------------------------
mood:
  keywords:
    - 静謐 (calm / quiet)
    - 知的 (intellectual)
    - 上品 / 品格 (refined, understated luxury)
    - 余白主義 (generous whitespace)
    - 文芸誌・印刷物の質感 (printed editorial / magazine)
    - 温かみのあるニュートラル (warm neutral, not cold)
    - 誠実・信頼 (honest, trustworthy)
  feels_like:
    - "高級な紙にインクで刷られた季刊誌の誌面"
    - "落ち着いた書店、ギャラリーの図録、上質なレターヘッド"
  not:
    - 騒がしい / 装飾過多 / グラデーション多用 / ネオン
    - 角丸の多いポップなUI / 強い影 / 彩度の高い原色

# -------------------------------------------------------------
# 2. カラーパレット — HEXは"役割"で抽象化
#    比率の目安: ベース 70% / インク 20% / アクセント 10%以下
# -------------------------------------------------------------
color:
  philosophy: >-
    ほぼ無彩色のウォームニュートラル基調に、信頼の濃色(ディープ)を1色、
    上品な金属系アクセント(ウォーム)を1色だけ効かせる。彩度は徹底して低く保つ。

  palette:
    # --- 背景 (warm off-white が主役。純白は使わず紙の温度感を出す) ---
    base:           "#fafaf7"   # メイン背景: ごく僅かに暖色のオフホワイト
    base_raised:    "#ffffff"   # カード/浮かせる面: 純白で僅かなコントラスト
    base_warm:      "#f4f0e8"   # 帯・サムネ下地など: クラフト紙的な温かい面

    # --- インク (黒は使わずダークグレーで柔らかく) ---
    ink:            "#1a1a1a"   # 見出し・主要テキスト
    ink_secondary:  "#3a3a3a"   # 本文
    ink_muted:      "#7a7a78"   # キャプション・補助・ラベル

    # --- 主役の濃色 (信頼感・締まり。ここをブランドカラーとして差し替え可) ---
    deep:           "#1e3a5f"   # ディープネイビー。フッター背景/強調/下線に
    deep_darker:    "#142a47"   # その陰影

    # --- アクセント (金属的なウォームトーン。少量で"格"を出す) ---
    accent:         "#b8956a"   # アンバー/ブラス。英字ラベル・記号・番号に
    accent_soft:    "#e8dcc7"   # アクセントの淡色 (濃色背景上の見出し等)

    # --- 罫線 (このデザインの背骨。線で構造を見せる) ---
    line:           "#d8d4c8"   # 主要な区切り線 (ウォームグレー)
    line_soft:      "#ebe7da"   # 控えめな内部の線

  swap_guide: >-
    別ブランドへ流用する時は「deep(濃色)」をブランドカラーに差し替え、
    「accent」をそのブランドに合う金属/中間色へ。
    base系・ink系・line系はほぼ固定で品位を維持できる。
    彩度を上げ過ぎないことが唯一にして最大のルール。

# -------------------------------------------------------------
# 3. タイポグラフィ — 和欧混植・セリフ主導
# -------------------------------------------------------------
typography:
  principle: >-
    見出しはセリフ(明朝/Serif)で格調を、本文はサンセリフ(ゴシック)で可読性を。
    英字は"イタリックのセリフ"をラベル/番号に使い、誌面のアクセントにする。
  roles:
    display_serif:  "重め・字間広め(letter-spacing .04–.08em)・行間ゆったりの明朝系 → 見出し"
    body_sans:      "標準ウェイトのゴシック系・行間広め(1.9–2.1) → 本文"
    accent_italic:  "イタリックのセリフ英字・字間広め(.15–.2em) → ラベル/番号/英語見出し"
  pairing_example:   # 具体フォントは一例。雰囲気が合えば差し替え可
    serif:  "Noto Serif JP / Hiragino Mincho 等"
    sans:   "Noto Sans JP / Hiragino Sans 等"
    latin:  "Cormorant Garamond (italic) 等"
  rhythm:
    line_height_body: "1.9 – 2.1 (ゆったり)"
    letter_spacing:   "ラベルや英字は広め、本文はわずか"
    case:             "英字ラベルは小さく・大文字や頭文字装飾も可"

# -------------------------------------------------------------
# 4. 質感 / スタイル規則 — "らしさ"を生む細部
# -------------------------------------------------------------
texture:
  borders:
    style:   "1px の細い実線を多用し、面ではなく"線"で領域を区切る"
    short_rule: "見出し下に 40–48px 程度の短い濃色バーを置く装飾"
    usage:   "セクション境界・カード格子・テーブル行をすべて罫線で構成"
  corners:    "角丸はほぼ無し (0px)。シャープで端正な矩形"
  shadows:    "ドロップシャドウは原則不使用。陰影は罫線と背景差で表現"
  fills:      "ベタ塗りは控えめ。濃色はフッター等"締め"の一箇所に集中投下"
  imagery:
    treatment: "画像は僅かに彩度を落とす(saturate .95)。誌面に馴染ませる"
    frame:     "サムネは細い罫線で囲む。アスペクト比は揃える(例 4:3)"
  decorative_marks:
    - "英字ラベルの前に「— 」(emダッシュ)を添える"
    - "セクション番号を「No. 01」「№ 02」のように誌面風に振る"
    - "リスト記号に「—」やアクセント色の「#」を使う"
    - "号数/季節 (例: No.01 — Spring) のような"刊行物"メタ表記"

# -------------------------------------------------------------
# 5. レイアウト原則 — ※具体配置ではなく"考え方"のみ
# -------------------------------------------------------------
layout_principles:
  whitespace:   "余白を最大の装飾とみなす。セクション上下に大きな間 (72–96px)"
  width:        "本文は読みやすい最大幅で中央寄せ (~1100–1160px / 読み物は~780px)"
  grid:         "罫線で区切ったグリッド/テーブル状の整然とした構成を好む"
  density:      "低密度。要素を詰め込まず"間"で語る"
  alignment:    "端正な左揃え基調。中央寄せは見出し等に限定的に"

# -------------------------------------------------------------
# 6. インタラクション — 控えめで上品な動き
# -------------------------------------------------------------
motion:
  principle:  "速すぎず・派手すぎず。0.2–0.6s のイージングで静かに反応"
  hover:
    links:    "下線が中央から伸びる / 色が濃色へ静かに変化"
    cards:    "背景がわずかに明るくなる・画像が僅かに(1.04倍)ズーム"
  scroll:     "スムーズスクロール。過度なパララックスやアニメは避ける"

# -------------------------------------------------------------
# 7. 生成AIへの指示文 (このYAMLをそのまま渡す時の要約プロンプト)
# -------------------------------------------------------------
prompt_summary: >-
  静謐で知的、印刷された文芸誌のような"エディトリアル"デザインで作ってほしい。
  背景は温かみのあるオフホワイト、テキストは黒に近いダークグレー、
  信頼感のあるディープネイビーを締め色に、金属的なアンバーをごく少量のアクセントに使う。
  彩度は全体に低く抑える。見出しは字間と行間に余裕を持たせた明朝(セリフ)、
  本文は行間広めのゴシック(サンセリフ)、英字ラベルや番号はイタリックのセリフで誌面風に。
  角丸や影は使わず、細い罫線で領域を区切る。余白をたっぷり取り、低密度で端正に。
  ホバーは下線が伸びる・背景が僅かに変わる程度の上品な動きに留める。
  全体として「高級紙に刷られた季刊誌」の空気感を最優先する。
